http_port 3128
mime_table /etc/squid/mime.conf

# Force IPv4 for all outgoing connections.
# Squid 7 removed dns_v4_first (Happy Eyeballs); binding the outgoing socket to
# 0.0.0.0 (IPv4 wildcard) prevents Squid from ever attempting IPv6 CONNECT
# tunnels, which fail inside Docker bridge networks with no IPv6 routing.
tcp_outgoing_address 0.0.0.0

# Allow only common private ranges used by Docker overlays/bridges.
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

# Port/method safety.
acl SSL_ports port 443
acl Safe_ports port 443
acl CONNECT method CONNECT

# Allowlist of outbound destinations required by EO4EU/CDSE flows.
acl allowed_domains dstdomain \
  .umm-api.apps.eo4eu.eu \
  .auth.apps.eo4eu.eu \
  .openeo.dataspace.copernicus.eu \
  .stac.dataspace.copernicus.eu \
  .zipper.dataspace.copernicus.eu \
  .earthengine.openeo.org \
  .identity.dataspace.copernicus.eu \
  .openstreetmap.org \
  .api.openai.com \
  .pinecone.io \
  .earth-search.aws.element84.com \
  .sentinel-cogs.s3.us-west-2.amazonaws.com \
  .copernicus-dem-30m.s3.amazonaws.com \
  .copernicus-dem-30m.s3.us-west-2.amazonaws.com \
  .googleapis.com \
  api.resend.com

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow only local containers to the allowlisted domains.
http_access allow localnet allowed_domains

# Deny everything else.
http_access deny all

# Do not cache API/auth traffic.
cache deny all

# Send logs to container stdout/stderr for docker service logs
cache_log /var/log/squid/cache.log
access_log stdio:/var/log/squid/access.log
